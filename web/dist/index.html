<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Excalidraw Spaces</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        background-color: #000000;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        background-color: #1e1e20;
        padding: 24px;
        border-radius: 12px;
      }

      .grid-modulos {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .bloco {
        background-color: #0a0a0a;
        color: #ffffff;
        font-family: "Courier New", Courier, monospace;
        font-size: 24px;
        font-weight: bold;
        padding: 40px 30px;
        border-radius: 8px;
        text-align: center;
        text-decoration: none;
        display: flex;
        justify-content: center;
        align-items: center;
        min-width: 140px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="grid-modulos">
      <a class="bloco" href="./SOM/">SOM</a>
      </div>
    </div>
  </body>
</html>
